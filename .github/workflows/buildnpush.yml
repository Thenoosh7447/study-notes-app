name: build and push

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  buildnpush:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
    
      - name: Build Docker Files
        run: | 
             docker build -t sna-fend-img:latest ./frontend
             docker build -t sna-bend-img:latest ./backend
             docker build -t sna-nx-img:latest ./nginx
      - uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKERHUB_ACTIONS_USERNAME}}
          password: ${{secrets.GITHUB_TOKEN}}
