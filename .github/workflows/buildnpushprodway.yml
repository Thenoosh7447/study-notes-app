name: Build and Push Images

on:  
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  buildnpush:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            image: thenoosh/sna-fend-img

          - name: backend
            context: ./backend
            image: thenoosh/sna-bend-img

          - name: nginx
            context: ./nginx
            image: thenoosh/sna-nx-img
    
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_ACTIONS_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACTIONS_PAT }}
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and Push Images
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
